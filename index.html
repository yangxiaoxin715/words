<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>单词猎人</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
  overflow-x: hidden;
}

.page { display: none; }
.page.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ===== 首页 ===== */
#home {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.home-icon { font-size: 80px; margin-bottom: 12px; }
#home h1 { font-size: 32px; font-weight: 800; margin-bottom: 32px; }

.progress-ring-wrap {
  position: relative;
  width: 200px; height: 200px;
  margin-bottom: 16px;
}
.progress-ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: #e5e5e7; stroke-width: 12; }
.ring-fill { fill: none; stroke: #34c759; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
.progress-ring-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.ring-num { font-size: 48px; font-weight: 800; color: #1d1d1f; }
.ring-label { font-size: 14px; color: #86868b; }

.home-hint {
  font-size: 16px; color: #86868b;
  margin-bottom: 28px;
}

.start-btn {
  width: 100%; max-width: 320px;
  padding: 20px; border-radius: 16px; border: none;
  font-size: 20px; font-weight: 800;
  cursor: pointer; color: #fff;
  background: linear-gradient(135deg, #ff9500, #ff3b30);
  transition: transform 0.15s;
  margin-bottom: 12px;
}
.start-btn:active { transform: scale(0.96); }
.start-btn.all-done { background: linear-gradient(135deg, #34c759, #30d158); }

.home-footer {
  display: flex; gap: 24px; margin-top: 32px;
}
.home-footer button {
  background: none; border: none;
  font-size: 14px; color: #86868b; cursor: pointer;
}
.home-footer button:active { color: #1d1d1f; }

/* ===== 闪卡页 ===== */
#quiz { padding: 0; }
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; background: #fff;
  border-bottom: 1px solid #e5e5e7;
  position: sticky; top: 0; z-index: 10;
}
.quiz-header .back-btn {
  font-size: 16px; color: #007aff;
  background: none; border: none; cursor: pointer; font-weight: 600;
}
.quiz-header .progress-text { font-size: 14px; color: #86868b; }
.quiz-header .day-label { font-size: 16px; font-weight: 700; }

.progress-bar-wrap {
  height: 4px; background: #e5e5e7;
  position: sticky; top: 57px; z-index: 10;
}
.progress-bar {
  height: 100%; background: #ff9500;
  transition: width 0.3s ease; border-radius: 2px;
}

.card-area {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px; min-height: 50vh; cursor: pointer;
}
.card-word-wrap {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 16px;
}
.card-word {
  font-size: 72px; font-weight: 800;
  letter-spacing: -1px; text-align: center;
  max-width: calc(100vw - 80px); overflow-wrap: break-word;
}
.speak-btn {
  font-size: 32px; background: none; border: none;
  cursor: pointer; padding: 4px; opacity: 0.5;
  transition: opacity 0.2s;
}
.speak-btn:active { opacity: 1; }
.card-chinese {
  font-size: 64px; font-weight: 700;
  color: #1d1d1f; min-height: 72px;
}
.card-chinese.hidden { display: none; }

.flip-hint {
  font-size: 14px; color: #86868b; margin-top: 20px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.flip-hint.hidden { display: none; }

.btn-group {
  display: flex; gap: 12px; padding: 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: #fff; border-top: 1px solid #e5e5e7;
}
.header-left { display: flex; gap: 12px; align-items: center; }
.undo-btn {
  font-size: 14px; color: #ff9500;
  background: none; border: none; cursor: pointer; font-weight: 600;
}
.undo-btn.hidden { display: none; }
.undo-btn:active { opacity: 0.5; }
.btn-group.hidden { display: none; }
.btn-group button {
  flex: 1; padding: 16px; border-radius: 14px; border: none;
  font-size: 17px; font-weight: 700; cursor: pointer;
  transition: transform 0.1s;
}
.btn-group button:active { transform: scale(0.95); }
.btn-group button { transition: transform 0.1s; }
.btn-correct { background: #34c759; color: #fff; }
.btn-wrong { background: #ff9500; color: #fff; }

/* ===== 战报页 ===== */
#report {
  align-items: center; justify-content: center; padding: 40px 20px;
}
#report h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
#report .report-sub { font-size: 14px; color: #86868b; margin-bottom: 32px; }

.stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; width: 100%; max-width: 360px; margin-bottom: 32px;
}
.stat-card {
  background: #fff; border-radius: 16px;
  padding: 20px 8px; text-align: center;
}
.stat-num { font-size: 32px; font-weight: 800; }
.stat-label { font-size: 12px; color: #86868b; margin-top: 4px; }
.stat-captured .stat-num { color: #34c759; }
.stat-hunting .stat-num { color: #ff9500; }
.stat-total .stat-num { color: #007aff; }

.progress-section {
  width: 100%; max-width: 360px;
  background: #fff; border-radius: 16px;
  padding: 20px; margin-bottom: 24px;
}
.progress-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.progress-bar-big {
  height: 28px; border-radius: 8px; overflow: hidden;
  display: flex; background: #e5e5e7; margin-bottom: 8px;
}
.seg-captured { background: #34c759; transition: width 0.5s; }
.seg-hunting { background: #ff9500; transition: width 0.5s; }
.seg-new { background: #e5e5e7; }
.progress-legend {
  display: flex; gap: 16px; font-size: 12px; color: #86868b;
}
.progress-legend span::before {
  content: ''; display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  margin-right: 4px; vertical-align: middle;
}
.legend-captured::before { background: #34c759; }
.legend-hunting::before { background: #ff9500; }
.legend-new::before { background: #e5e5e7; }

.report-actions {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%; max-width: 360px;
}
.report-actions button {
  padding: 14px; border-radius: 12px; border: none;
  font-size: 16px; font-weight: 600; cursor: pointer;
}
.btn-primary { background: #ff9500; color: #fff; }
.btn-secondary { background: #e5e5e7; color: #1d1d1f; }
.btn-primary:active, .btn-secondary:active { opacity: 0.8; }

/* ===== 掌握地图页 ===== */
#mappage {
  padding: 20px; align-items: center;
}
#mappage h2 { font-size: 24px; font-weight: 700; margin: 20px 0 16px; }
.map-stats {
  font-size: 16px; color: #86868b; margin-bottom: 20px;
}
.mastery-map {
  width: 100%; max-width: 400px;
  background: #fff; border-radius: 16px;
  padding: 20px; margin-bottom: 24px;
}
.mastery-section { margin-bottom: 16px; }
.mastery-section h4 { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.mastery-words { display: flex; flex-wrap: wrap; gap: 6px; }
.mastery-words span {
  font-size: 13px; padding: 3px 8px; border-radius: 6px;
}
.mw-captured { background: #d1f5d3; color: #1b7a2b; }
.mw-hunting { background: #fff3cd; color: #856404; }
.mw-new { background: #e9ecef; color: #6c757d; }

.btn-back-home {
  padding: 14px 40px; border-radius: 12px; border: none;
  background: #007aff; color: #fff;
  font-size: 16px; font-weight: 600;
  cursor: pointer; margin-bottom: 12px;
}
.btn-export {
  padding: 14px 40px; border-radius: 12px;
  border: 2px solid #007aff; background: #fff; color: #007aff;
  font-size: 16px; font-weight: 600;
  cursor: pointer; margin-bottom: 40px;
}
</style>
</head>
<body>

<!-- 首页 -->
<div id="home" class="page active">
  <div class="home-icon">🎯</div>
  <h1>单词猎人</h1>
  <div class="progress-ring-wrap">
    <svg width="200" height="200">
      <circle class="ring-bg" cx="100" cy="100" r="88"/>
      <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="88"/>
    </svg>
    <div class="progress-ring-center">
      <div class="ring-num" id="ringNum">0</div>
      <div class="ring-label">已捕获</div>
    </div>
  </div>
  <div class="home-hint" id="homeHint"></div>
  <button class="start-btn" id="startBtn" onclick="startHunt()">开始捕猎</button>
  <div class="home-footer">
    <button onclick="showMap()">🏆 战绩</button>
    <button onclick="exportData()">📤 导出</button>
    <button onclick="confirmReset()">⚙️ 重置</button>
  </div>
</div>

<!-- 闪卡页 -->
<div id="quiz" class="page">
  <div class="quiz-header">
    <div class="header-left">
      <button class="back-btn" onclick="exitQuiz()">← 返回</button>
      <button class="undo-btn hidden" id="undoBtn" onclick="undoLast()">↩ 撤销</button>
    </div>
    <span class="day-label" id="quizLabel">捕猎中</span>
    <span class="progress-text" id="progressText"></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="card-area" onclick="flipCard()">
    <div class="card-word-wrap">
      <div class="card-word" id="cardWord"></div>
      <button class="speak-btn" onclick="event.stopPropagation(); speakWord()">🔊</button>
    </div>
    <div class="card-chinese hidden" id="cardChinese"></div>
    <div class="flip-hint" id="flipHint">👆 点击翻牌，看答案</div>
  </div>
  <div class="btn-group hidden" id="btnGroup">
    <button class="btn-correct" onclick="answer(true)">✅ 已捕获</button>
    <button class="btn-wrong" onclick="answer(false)">🎯 待捕获</button>
  </div>
</div>

<!-- 战报 -->
<div id="report" class="page">
  <h2 id="reportTitle">捕猎战报</h2>
  <p class="report-sub" id="reportSub"></p>
  <div class="stats-grid">
    <div class="stat-card stat-captured">
      <div class="stat-num" id="statNew">0</div>
      <div class="stat-label">本轮新捕获</div>
    </div>
    <div class="stat-card stat-hunting">
      <div class="stat-num" id="statHunting">0</div>
      <div class="stat-label">追踪中</div>
    </div>
    <div class="stat-card stat-total">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">累计捕获</div>
    </div>
  </div>
  <div class="progress-section">
    <h3>总进度</h3>
    <div class="progress-bar-big" id="progressBig"></div>
    <div class="progress-legend">
      <span class="legend-captured">已捕获</span>
      <span class="legend-hunting">追踪中</span>
      <span class="legend-new">未见</span>
    </div>
  </div>
  <div class="report-actions">
    <button class="btn-primary" id="nextBtn" onclick="startHunt()">继续捕猎 →</button>
    <button class="btn-secondary" onclick="goHome()">回到首页</button>
  </div>
</div>

<!-- 掌握地图 -->
<div id="mappage" class="page">
  <h2>掌握地图</h2>
  <div class="map-stats" id="mapStats"></div>
  <div class="mastery-map" id="masteryMap"></div>
  <button class="btn-export" onclick="exportData()">导出数据</button>
  <button class="btn-back-home" onclick="goHome()">返回首页</button>
</div>

{"english":"Hat","chinese":"帽子","tier":"T1"},{"english":"Shoes","chinese":"鞋子","tier":"T3"},{"english":"Breakfast","chinese":"早餐","tier":"T3"},{"english":"Dinner","chinese":"晚餐","tier":"T3"},{"english":"Gift","chinese":"礼物","tier":"T1"},{"english":"Sea","chinese":"海","tier":"T2"},{"english":"Wind","chinese":"风","tier":"T1"},{"english":"Beach","chinese":"海滩","tier":"T2"},{"english":"Fire","chinese":"火","tier":"T2"},{"english":"King","chinese":"国王","tier":"T1"},{"english":"Queen","chinese":"女王","tier":"T2"},{"english":"Student","chinese":"学生","tier":"T3"},{"english":"Police","chinese":"警察","tier":"T3"},{"english":"Hospital","chinese":"医院","tier":"T3"},{"english":"Money","chinese":"钱","tier":"T3"},{"english":"Sport","chinese":"运动","tier":"T2"},{"english":"Song","chinese":"歌曲","tier":"T1"},{"english":"Movie","chinese":"电影","tier":"T2"},{"english":"Dream","chinese":"梦","tier":"T2"},{"english":"Letter","chinese":"信/字母","tier":"T3"},{"english":"Camera","chinese":"相机","tier":"T3"},{"english":"Island","chinese":"岛","tier":"T3"},{"english":"Country","chinese":"国家","tier":"T3"},{"english":"Earth","chinese":"地球","tier":"T3"},{"english":"Ocean","chinese":"海洋","tier":"T3"},{"english":"Nature","chinese":"自然","tier":"T3"},{"english":"Winter","chinese":"冬天","tier":"T3"},{"english":"Evening","chinese":"晚上","tier":"T3"},{"english":"Person","chinese":"人","tier":"T3"}];

const TOTAL = WORDS.length;
const CAPTURE_THRESHOLD = 3;

// ===== 数据存储 =====
// { wordKey: correctCount }  >= 3 = captured
const STORAGE_KEY = 'wordHunter_data';

function getKey(w) { return w.english.toLowerCase().replace(/[^a-z0-9]/g, '_'); }

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function isCaptured(data, w) { return (data[getKey(w)] || 0) >= CAPTURE_THRESHOLD; }
function isHunting(data, w) { const c = data[getKey(w)] || 0; return c > 0 && c < CAPTURE_THRESHOLD; }
function isNew(data, w) { return !data[getKey(w)]; }

function getCapturedCount(data) { return WORDS.filter(w => isCaptured(data, w)).length; }
function getHuntingCount(data) { return WORDS.filter(w => isHunting(data, w)).length; }
function getRemainingWords(data) { return WORDS.filter(w => !isCaptured(data, w)); }

// ===== 页面切换 =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== 首页 =====
function renderHome() {
  const data = loadData();
  const captured = getCapturedCount(data);
  const remaining = TOTAL - captured;

  // 进度环
  const circumference = 2 * Math.PI * 88;
  const ring = document.getElementById('ringFill');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference - (captured / TOTAL) * circumference;
  document.getElementById('ringNum').textContent = captured;

  const btn = document.getElementById('startBtn');
  const hint = document.getElementById('homeHint');

  if (captured >= TOTAL) {
    hint.textContent = '全部 200 词已捕获！';
    btn.textContent = '👑 查看掌握地图';
    btn.className = 'start-btn all-done';
    btn.onclick = showMap;
  } else if (!isDiagnosticDone(data)) {
    const seen = WORDS.filter(w => data.hasOwnProperty(getKey(w))).length;
    const left = TOTAL - seen;
    hint.textContent = seen === 0 ? `先跑一遍 200 词，摸个底` : `首轮诊断中 · 还剩 ${left} 词`;
    btn.textContent = seen === 0 ? '开始诊断' : '继续诊断';
    btn.className = 'start-btn';
    btn.onclick = startHunt;
  } else {
    const nextWords = pickRoundWords(data);
    hint.textContent = `剩余 ${remaining} 词 · 本轮 ${nextWords.length} 词`;
    btn.textContent = '继续捕猎';
    btn.className = 'start-btn';
    btn.onclick = startHunt;
  }

  showPage('home');
}

// ===== 语音 =====
let enVoice = null;
function loadVoice() {
  const voices = speechSynthesis.getVoices();
  enVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Samantha'))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'))
    || null;
}
speechSynthesis.onvoiceschanged = loadVoice;
loadVoice();

function speakWord() {
  if (!quizWords[quizIndex]) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(quizWords[quizIndex].english);
  u.lang = 'en-US'; u.rate = 0.8; u.pitch = 1.0;
  if (enVoice) u.voice = enVoice;
  speechSynthesis.speak(u);
}

// ===== 捕猎 =====
let quizWords = [];
let quizIndex = 0;
let roundResults = []; // [{word, correct: bool}]
let capturedBeforeRound = 0;

const ROUND_SIZE = 20; // 后续每轮出词数

function isDiagnosticDone(data) {
  // 所有 200 词都至少见过一次（correctCount >= 0 且 key 存在）
  return WORDS.every(w => data.hasOwnProperty(getKey(w)));
}

function pickRoundWords(data) {
  if (!isDiagnosticDone(data)) {
    // 首轮诊断未完成：只出还没见过的词
    return WORDS.filter(w => !data.hasOwnProperty(getKey(w)));
  }

  const remaining = getRemainingWords(data);
  if (remaining.length === 0) return [];

  // 诊断完成后：优先复习词（1-2次），新词补满，总共 ROUND_SIZE
  const review = remaining.filter(w => isHunting(data, w));
  const unseen = remaining.filter(w => isNew(data, w));

  review.sort(() => Math.random() - 0.5);
  unseen.sort(() => Math.random() - 0.5);

  let picked = [];
  picked.push(...review.slice(0, ROUND_SIZE));
  if (picked.length < ROUND_SIZE) {
    picked.push(...unseen.slice(0, ROUND_SIZE - picked.length));
  }

  return picked;
}

function startHunt() {
  const data = loadData();
  quizWords = pickRoundWords(data);

  if (quizWords.length === 0) {
    showMap();
    return;
  }

  // 打乱顺序
  quizWords.sort(() => Math.random() - 0.5);
  quizIndex = 0;
  roundResults = [];
  capturedBeforeRound = getCapturedCount(data);

  const diagDone = isDiagnosticDone(data);
  const label = !diagDone
    ? `首轮诊断 · ${quizWords.length} 词`
    : `捕猎中 · ${quizWords.length} 词`;
  document.getElementById('quizLabel').textContent = label;
  showPage('quiz');
  showCard();
}

let cardFlipped = false;

function showCard() {
  if (quizIndex >= quizWords.length) {
    showReport();
    return;
  }
  cardFlipped = false;
  const w = quizWords[quizIndex];
  document.getElementById('cardChinese').textContent = '';
  document.getElementById('cardChinese').classList.add('hidden');
  document.getElementById('btnGroup').classList.add('hidden');
  const cardEl = document.getElementById('cardWord');
  cardEl.textContent = w.english;
  // 长词自动缩小字号
  const len = w.english.length;
  cardEl.style.fontSize = len <= 5 ? '72px' : len <= 8 ? '56px' : len <= 11 ? '44px' : '36px';
  document.getElementById('flipHint').classList.remove('hidden');
  document.getElementById('progressText').textContent = `${quizIndex + 1} / ${quizWords.length}`;
  document.getElementById('progressBar').style.width = `${(quizIndex / quizWords.length) * 100}%`;
  updateUndoBar();
  speakWord();
}

function flipCard() {
  if (cardFlipped) return;
  cardFlipped = true;
  const w = quizWords[quizIndex];
  document.getElementById('cardChinese').textContent = w.chinese;
  document.getElementById('cardChinese').classList.remove('hidden');
  document.getElementById('flipHint').classList.add('hidden');
  document.getElementById('btnGroup').classList.remove('hidden');
}

function answer(correct) {
  const w = quizWords[quizIndex];
  const data = loadData();
  const key = getKey(w);

  // 记录旧值用于撤销
  const prevValue = data[key];

  if (correct) {
    data[key] = (data[key] || 0) + 1;
  } else {
    if (!data[key]) data[key] = 0;
  }
  saveData(data);

  roundResults.push({ word: w, correct, prevValue });
  quizIndex++;
  updateUndoBar();
  showCard();
}

function undoLast() {
  if (roundResults.length === 0) return;
  const last = roundResults.pop();
  const data = loadData();
  const key = getKey(last.word);

  // 恢复旧值
  if (last.prevValue === undefined) {
    delete data[key];
  } else {
    data[key] = last.prevValue;
  }
  saveData(data);

  quizIndex--;
  updateUndoBar();
  showCard();
}

function updateUndoBar() {
  const btn = document.getElementById('undoBtn');
  if (roundResults.length > 0) {
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
  }
}

function exitQuiz() {
  if (quizIndex > 0 && quizIndex < quizWords.length) {
    if (!confirm(`已完成 ${quizIndex}/${quizWords.length}，确定退出吗？进度已保存。`)) return;
  }
  goHome();
}

// ===== 战报 =====
function showReport() {
  const data = loadData();
  const capturedNow = getCapturedCount(data);
  const newCaptured = capturedNow - capturedBeforeRound;
  const hunting = getHuntingCount(data);
  const remaining = TOTAL - capturedNow;

  const correctThisRound = roundResults.filter(r => r.correct).length;

  document.getElementById('reportTitle').textContent = remaining === 0 ? '🎉 全部捕获！' : '捕猎战报';
  document.getElementById('reportSub').textContent = `本轮 ${quizWords.length} 词 · 答对 ${correctThisRound} 个`;
  document.getElementById('statNew').textContent = newCaptured;
  document.getElementById('statHunting').textContent = hunting;
  document.getElementById('statTotal').textContent = capturedNow;

  // 进度条
  const newCount = WORDS.filter(w => isNew(data, w)).length;
  document.getElementById('progressBig').innerHTML = `
    <div class="seg-captured" style="width:${capturedNow/TOTAL*100}%"></div>
    <div class="seg-hunting" style="width:${hunting/TOTAL*100}%"></div>
    <div class="seg-new" style="width:${newCount/TOTAL*100}%"></div>
  `;

  // 按钮
  const nextBtn = document.getElementById('nextBtn');
  if (remaining === 0) {
    nextBtn.textContent = '查看掌握地图';
    nextBtn.onclick = showMap;
  } else {
    nextBtn.textContent = `继续捕猎（剩 ${remaining} 词）→`;
    nextBtn.onclick = startHunt;
  }

  showPage('report');
}

// ===== 掌握地图 =====
function showMap() {
  const data = loadData();
  const captured = WORDS.filter(w => isCaptured(data, w));
  const hunting = WORDS.filter(w => isHunting(data, w));
  const unseen = WORDS.filter(w => isNew(data, w));

  document.getElementById('mapStats').textContent =
    `已捕获 ${captured.length} · 追踪中 ${hunting.length} · 未见 ${unseen.length}`;

  function tags(words, cls) {
    return words.map(w => {
      const c = data[getKey(w)] || 0;
      const label = cls === 'mw-hunting' ? `${w.english}(${c}/${CAPTURE_THRESHOLD})` : w.english;
      return `<span class="${cls}">${label}</span>`;
    }).join('');
  }

  let html = '';
  if (captured.length > 0)
    html += `<div class="mastery-section"><h4>✅ 已捕获（${captured.length}）</h4><div class="mastery-words">${tags(captured, 'mw-captured')}</div></div>`;
  if (hunting.length > 0)
    html += `<div class="mastery-section"><h4>🎯 追踪中（${hunting.length}）</h4><div class="mastery-words">${tags(hunting, 'mw-hunting')}</div></div>`;
  if (unseen.length > 0)
    html += `<div class="mastery-section"><h4>未见（${unseen.length}）</h4><div class="mastery-words" style="max-height:200px;overflow-y:auto">${tags(unseen, 'mw-new')}</div></div>`;

  document.getElementById('masteryMap').innerHTML = html || '<p>还没有数据</p>';
  showPage('mappage');
}

function exportData() {
  const data = loadData();
  let csv = 'English,Chinese,Tier,正确次数,状态\n';
  WORDS.forEach(w => {
    const c = data[getKey(w)] || 0;
    const status = c >= CAPTURE_THRESHOLD ? '已捕获' : c > 0 ? '追踪中' : '未见';
    csv += `${w.english},${w.chinese},${w.tier},${c},${status}\n`;
  });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '单词猎人掌握地图.csv';
  a.click(); URL.revokeObjectURL(url);
}

// ===== 工具 =====
function goHome() { renderHome(); }
function confirmReset() {
  if (confirm('确定要清除所有数据吗？此操作不可恢复。')) {
    localStorage.removeItem(STORAGE_KEY);
    renderHome();
  }
}

// ===== 启动 =====
renderHome();
</script>
