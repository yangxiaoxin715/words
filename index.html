<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>单词猎人</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== 首页 ===== */
.page { display: none; }
.page.active { display: flex; flex-direction: column; min-height: 100vh; }

#home {
  align-items: center;
  padding: 0 20px 40px;
}

/* 顶部栏 */
.home-top {
  width: 100%;
  max-width: 400px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  position: sticky;
  top: 0;
  background: #f5f5f7;
  z-index: 10;
}
.home-top h1 {
  font-size: 22px;
  font-weight: 800;
}
.home-top-actions {
  display: flex;
  gap: 8px;
}
.home-top-actions button {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  font-size: 18px;
  cursor: pointer;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}
.home-top-actions button:active { opacity: 0.7; }

/* 总进度条 */
.home-progress {
  width: 100%;
  max-width: 400px;
  margin-bottom: 24px;
}
.home-progress-bar {
  height: 8px;
  background: #e5e5e7;
  border-radius: 4px;
  overflow: hidden;
}
.home-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #34c759, #30d158);
  border-radius: 4px;
  transition: width 0.5s ease;
}
.home-progress-text {
  font-size: 13px;
  color: #86868b;
  margin-top: 6px;
  text-align: center;
}

/* 路径容器 */
.path-container {
  width: 100%;
  max-width: 400px;
}

/* Day 分区 */
.day-section {
  margin-bottom: 12px;
}
.day-header {
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.day-header.day-1 { background: linear-gradient(135deg, #f093fb, #f5576c); }
.day-header.day-2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
.day-header.day-3 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
.day-header.day-4 { background: linear-gradient(135deg, #fa709a, #fee140); }
.day-header.day-5 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
.day-header-icon { font-size: 32px; }
.day-header-info h2 { font-size: 18px; font-weight: 800; }
.day-header-info p { font-size: 13px; opacity: 0.9; }

/* 关卡节点 */
.level-path {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px 8px;
}
.level-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
  width: 100%;
  max-width: 300px;
}
.level-row:nth-child(odd) { justify-content: flex-start; padding-left: 20px; }
.level-row:nth-child(even) { justify-content: flex-end; padding-right: 20px; }
.level-node {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: 800;
  font-size: 14px;
  transition: transform 0.2s;
  border: 3px solid #d1d1d6;
  background: #fff;
  color: #86868b;
}
.level-node:active { transform: scale(0.9); }
.level-node .level-icon { font-size: 22px; line-height: 1; }
.level-node .level-label { font-size: 10px; margin-top: 1px; }
.level-node.completed {
  background: #34c759;
  border-color: #2db84d;
  color: #fff;
}
.level-node.current {
  background: #007aff;
  border-color: #0066dd;
  color: #fff;
  animation: bounce 1.5s infinite;
}
.level-node.locked {
  opacity: 0.4;
  cursor: default;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* 底部特殊按钮 */
.special-section {
  width: 100%;
  max-width: 400px;
  display: flex;
  gap: 12px;
  margin-top: 12px;
  margin-bottom: 20px;
}
.special-btn {
  flex: 1;
  padding: 16px;
  border-radius: 16px;
  border: 2px solid #e5e5e7;
  background: #fff;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.special-btn:active { transform: scale(0.96); }
.special-btn .sp-icon { font-size: 24px; }
.special-btn .sp-label { font-size: 14px; font-weight: 700; margin-top: 4px; }
.special-btn .sp-desc { font-size: 11px; color: #86868b; margin-top: 2px; }

/* ===== 闪卡页 ===== */
#quiz {
  padding: 0;
}
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: #fff;
  border-bottom: 1px solid #e5e5e7;
  position: sticky;
  top: 0;
  z-index: 10;
}
.quiz-header .back-btn {
  font-size: 16px;
  color: #007aff;
  background: none;
  border: none;
  cursor: pointer;
  font-weight: 600;
}
.quiz-header .progress-text {
  font-size: 14px;
  color: #86868b;
}
.quiz-header .day-label {
  font-size: 16px;
  font-weight: 700;
}

.progress-bar-wrap {
  height: 4px;
  background: #e5e5e7;
  position: sticky;
  top: 57px;
  z-index: 10;
}
.progress-bar {
  height: 100%;
  background: #007aff;
  transition: width 0.3s ease;
  border-radius: 2px;
}

.card-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  min-height: 50vh;
}

.card-word-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}
.card-word {
  font-size: 72px;
  font-weight: 800;
  letter-spacing: -1px;
  text-align: center;
}
.speak-btn {
  font-size: 32px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.speak-btn:active { opacity: 1; }
.card-chinese {
  font-size: 64px;
  font-weight: 700;
  color: #1d1d1f;
  min-height: 72px;
}
.card-chinese.hidden { display: none; }

.card-area { cursor: pointer; }
.flip-hint {
  font-size: 14px;
  color: #86868b;
  margin-top: 20px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.flip-hint.hidden { display: none; }

.btn-group {
  display: flex;
  gap: 12px;
  padding: 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: #fff;
  border-top: 1px solid #e5e5e7;
}
.btn-group.hidden { display: none; }
.btn-group button {
  flex: 1;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s;
}
.btn-group button:active { transform: scale(0.95); }
.btn-correct { background: #34c759; color: #fff; }
.btn-wrong { background: #ff3b30; color: #fff; }

/* ===== 战报页 ===== */
#report {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
#report h2 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
}
#report .report-day {
  font-size: 14px;
  color: #86868b;
  margin-bottom: 32px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 360px;
  margin-bottom: 32px;
}
.stat-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px 12px;
  text-align: center;
}
.stat-num {
  font-size: 36px;
  font-weight: 800;
}
.stat-label {
  font-size: 13px;
  color: #86868b;
  margin-top: 4px;
}
.stat-know .stat-num { color: #34c759; }
.stat-unknown .stat-num { color: #ff3b30; }

.compare-section {
  width: 100%;
  max-width: 360px;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
}
.compare-section h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 16px;
}
.compare-bar {
  display: flex;
  height: 28px;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 8px;
}
.compare-bar .seg-know { background: #34c759; }
.compare-bar .seg-maybe { background: #ff9500; }
.compare-bar .seg-unknown { background: #ff3b30; }
.compare-bar .seg-todo { background: #e5e5e7; }
.compare-legend {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: #86868b;
}
.compare-legend span::before {
  content: '';
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}
.legend-know::before { background: #34c759; }
.legend-maybe::before { background: #ff9500; }
.legend-unknown::before { background: #ff3b30; }
.legend-todo::before { background: #e5e5e7; }

.report-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 360px;
}
.report-actions button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.btn-home { background: #007aff; color: #fff; }
.btn-redo { background: #e5e5e7; color: #1d1d1f; }
.btn-home:active, .btn-redo:active { opacity: 0.8; }

/* ===== 总报告页 ===== */
#fullreport {
  padding: 20px;
  align-items: center;
}
#fullreport h2 {
  font-size: 24px;
  font-weight: 700;
  margin: 20px 0 8px;
}
.full-stats {
  width: 100%;
  max-width: 400px;
  margin-bottom: 24px;
}
.full-day-row {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid #f0f0f0;
}
.full-day-row .fdr-label {
  width: 60px;
  font-weight: 600;
  font-size: 14px;
}
.full-day-row .fdr-bar {
  flex: 1;
  display: flex;
  height: 20px;
  border-radius: 6px;
  overflow: hidden;
  margin: 0 12px;
}
.full-day-row .fdr-nums {
  font-size: 12px;
  color: #86868b;
  white-space: nowrap;
}

.mastery-map {
  width: 100%;
  max-width: 400px;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
}
.mastery-map h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
}
.mastery-section {
  margin-bottom: 16px;
}
.mastery-section h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
}
.mastery-words {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.mastery-words span {
  font-size: 13px;
  padding: 3px 8px;
  border-radius: 6px;
}
.mw-know { background: #d1f5d3; color: #1b7a2b; }
.mw-maybe { background: #fff3cd; color: #856404; }
.mw-unknown { background: #ffd6d6; color: #b31a1a; }

.btn-back-home {
  padding: 14px 40px;
  border-radius: 12px;
  border: none;
  background: #007aff;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 40px;
}
.btn-export {
  padding: 14px 40px;
  border-radius: 12px;
  border: 2px solid #007aff;
  background: #fff;
  color: #007aff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 12px;
}
</style>
</head>
<body>

<!-- 首页 -->
<div id="home" class="page active">
  <div class="home-top">
    <h1>🎯 单词猎人</h1>
    <div class="home-top-actions">
      <button onclick="showFullReport()" title="战绩">🏆</button>
      <button onclick="confirmReset()" title="重置">⚙️</button>
    </div>
  </div>
  <div class="home-progress">
    <div class="home-progress-bar"><div class="home-progress-fill" id="homeProgressFill"></div></div>
    <div class="home-progress-text" id="homeProgressText"></div>
  </div>
  <div class="path-container" id="pathContainer"></div>
  <div class="special-section">
    <div class="special-btn" onclick="startReview()">
      <div class="sp-icon">🔄</div>
      <div class="sp-label">巩固</div>
      <div class="sp-desc">待攻克的词</div>
    </div>
    <div class="special-btn" onclick="startFullTest()">
      <div class="sp-icon">⚡</div>
      <div class="sp-label">全量检验</div>
      <div class="sp-desc">575 词挑战</div>
    </div>
  </div>
</div>

<!-- 闪卡页 -->
<div id="quiz" class="page">
  <div class="quiz-header">
    <button class="back-btn" onclick="exitQuiz()">← 返回</button>
    <span class="day-label" id="quizDayLabel"></span>
    <span class="progress-text" id="progressText"></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-word-wrap">
      <div class="card-word" id="cardWord"></div>
      <button class="speak-btn" onclick="event.stopPropagation(); speakWord()">🔊</button>
    </div>
    <div class="card-chinese hidden" id="cardChinese"></div>
    <div class="flip-hint" id="flipHint">👆 点击翻牌，看答案</div>
  </div>
  <div class="btn-group hidden" id="btnGroup">
    <button class="btn-correct" onclick="answer('know')">✅ 已掌握</button>
    <button class="btn-wrong" onclick="answer('unknown')">🎯 待攻克</button>
  </div>
</div>

<!-- 当日战报 -->
<div id="report" class="page">
  <h2>今日战报</h2>
  <p class="report-day" id="reportDay"></p>
  <div class="stats-grid">
    <div class="stat-card stat-know">
      <div class="stat-num" id="statKnow">0</div>
      <div class="stat-label">✅ 已掌握</div>
    </div>
    <div class="stat-card stat-unknown">
      <div class="stat-num" id="statUnknow">0</div>
      <div class="stat-label">🎯 待攻克</div>
    </div>
  </div>
  <div class="compare-section">
    <h3>575 词总进度</h3>
    <div class="compare-bar" id="compareBar"></div>
    <div class="compare-legend">
      <span class="legend-know">认识</span>
      <span class="legend-maybe">半熟</span>
      <span class="legend-unknown">不认识</span>
      <span class="legend-todo">未测</span>
    </div>
  </div>
  <div class="report-actions">
    <button class="btn-home" onclick="goHome()">回到首页</button>
    <button class="btn-redo" id="redoBtn" onclick="redoLevel()">再闯一遍</button>
  </div>
</div>

<!-- 总报告 -->
<div id="fullreport" class="page">
  <h2>掌握地图</h2>
  <div class="full-stats" id="fullStats"></div>
  <div class="mastery-map" id="masteryMap"></div>
  <button class="btn-export" onclick="exportData()">导出数据</button>
  <button class="btn-back-home" onclick="goHome()">返回首页</button>
</div>

// ===== 状态管理 =====
const STORAGE_KEY = 'vocab625_results';

// 数据格式：{ wordKey: { history: ['know','unknown','know'], latest: 'know' } }
// 兼容旧格式（字符串值）自动迁移
function loadResults() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    // 迁移旧格式
    for (const key in raw) {
      if (typeof raw[key] === 'string') {
        raw[key] = { history: [raw[key]], latest: raw[key] };
      }
    }
    return raw;
  } catch { return {}; }
}
function saveResults(results) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
}
function getWordKey(w) {
  return w.english.toLowerCase().replace(/[^a-z0-9]/g, '_');
}
// 获取单词的掌握状态：know / maybe / unknown
// maybe = 历史中既有 unknown 又有 know（说明从不会到会了，半熟）
function getMastery(record) {
  if (!record) return null;
  const h = record.history || [];
  if (record.latest === 'know' && h.includes('unknown')) return 'maybe';
  return record.latest;
}

// ===== 页面切换 =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== 首页 =====
const LEVELS_PER_DAY = 5;
const DAY_ICONS = ['🌟', '🔥', '💎', '🚀', '👑'];
const DAY_NAMES = ['启程', '加速', '突破', '冲刺', '登顶'];

function getLevels(day) {
  const dayWords = WORDS_DATA.filter(w => w.day === day);
  const perLevel = Math.ceil(dayWords.length / LEVELS_PER_DAY);
  const levels = [];
  for (let i = 0; i < LEVELS_PER_DAY; i++) {
    levels.push(dayWords.slice(i * perLevel, (i + 1) * perLevel));
  }
  return levels;
}

function renderHome() {
  const results = loadResults();
  const container = document.getElementById('pathContainer');
  container.innerHTML = '';

  // 总进度
  const totalWords = WORDS_DATA.length;
  const masteredWords = WORDS_DATA.filter(w => {
    const m = getMastery(results[getWordKey(w)]);
    return m === 'know' || m === 'maybe';
  }).length;
  document.getElementById('homeProgressFill').style.width = `${(masteredWords / totalWords) * 100}%`;
  document.getElementById('homeProgressText').textContent = `已捕获 ${masteredWords} / ${totalWords} 词`;

  for (let d = 1; d <= 5; d++) {
    const levels = getLevels(d);
    const dayWords = WORDS_DATA.filter(w => w.day === d);
    const dayTested = dayWords.filter(w => results[getWordKey(w)]).length;
    const dayKnow = dayWords.filter(w => getMastery(results[getWordKey(w)]) === 'know').length;

    // Day 标题卡
    const section = document.createElement('div');
    section.className = 'day-section';

    const header = document.createElement('div');
    header.className = `day-header day-${d}`;
    header.innerHTML = `
      <div class="day-header-icon">${DAY_ICONS[d-1]}</div>
      <div class="day-header-info">
        <h2>Day ${d} · ${DAY_NAMES[d-1]}</h2>
        <p>${dayTested > 0 ? `已捕获 ${dayKnow}/${dayWords.length} 词` : `${dayWords.length} 词等你来猎`}</p>
      </div>
    `;
    section.appendChild(header);

    // 关卡路径
    const path = document.createElement('div');
    path.className = 'level-path';

    levels.forEach((words, i) => {
      const tested = words.filter(w => results[getWordKey(w)]).length;
      const know = words.filter(w => getMastery(results[getWordKey(w)]) === 'know').length;
      const isCompleted = tested === words.length && tested > 0;
      const isCurrent = !isCompleted && (i === 0 || levels[i-1].every(w => results[getWordKey(w)]));

      const row = document.createElement('div');
      row.className = 'level-row';

      const node = document.createElement('div');
      node.className = 'level-node' + (isCompleted ? ' completed' : isCurrent ? ' current' : '');

      if (isCompleted) {
        node.innerHTML = `<div class="level-icon">✅</div><div class="level-label">${know}/${words.length}</div>`;
      } else {
        node.innerHTML = `<div class="level-icon">${i + 1}</div><div class="level-label">${words.length}词</div>`;
      }

      node.onclick = () => startLevel(d, i);
      row.appendChild(node);
      path.appendChild(row);
    });

    section.appendChild(path);
    container.appendChild(section);
  }

  showPage('home');
}

}

  document.getElementById('flipHint').classList.add('hidden');
  document.getElementById('btnGroup').classList.remove('hidden');
}

function answer(result) {
  const w = currentWords[currentIndex];
  const results = loadResults();
  const key = getWordKey(w);
  if (!results[key]) {
    results[key] = { history: [], latest: null };
  }
  results[key].history.push(result);
  results[key].latest = result;
  saveResults(results);
  currentIndex++;
  showCard();
}

function exitQuiz() {
  if (currentIndex > 0 && currentIndex < currentWords.length) {
    if (!confirm(`已完成 ${currentIndex}/${currentWords.length}，确定退出吗？进度已自动保存。`)) return;
  }
  goHome();
}

// ===== 当日战报 =====
function showReport() {
  const results = loadResults();
  const words = currentWords;
  // 本轮统计：直接看 latest（本轮刚答的）
  const know = words.filter(w => { const r = results[getWordKey(w)]; return r && r.latest === 'know'; }).length;
  const unknown = words.filter(w => { const r = results[getWordKey(w)]; return r && r.latest === 'unknown'; }).length;

  let label = currentMode === 'level' ? `Day ${currentDay} · 第${currentLevel + 1}关` : currentMode === 'review' ? '巩固' : '全量检验';
  document.getElementById('reportDay').textContent = label + ` · ${words.length} 词`;
  document.getElementById('statKnow').textContent = know;
  document.getElementById('statUnknow').textContent = unknown;

  // 总进度条（用 getMastery 计算含半熟）
  const total = WORDS_DATA.length;
  const allKnow = WORDS_DATA.filter(w => getMastery(results[getWordKey(w)]) === 'know').length;
  const allMaybe = WORDS_DATA.filter(w => getMastery(results[getWordKey(w)]) === 'maybe').length;
  const allUnknown = WORDS_DATA.filter(w => getMastery(results[getWordKey(w)]) === 'unknown').length;
  const allTodo = total - allKnow - allMaybe - allUnknown;

  const bar = document.getElementById('compareBar');
  bar.innerHTML = `
    <div class="seg-know" style="width:${allKnow/total*100}%"></div>
    <div class="seg-maybe" style="width:${allMaybe/total*100}%"></div>
    <div class="seg-unknown" style="width:${allUnknown/total*100}%"></div>
    <div class="seg-todo" style="width:${allTodo/total*100}%"></div>
  `;

  document.getElementById('redoBtn').textContent =
    currentMode === 'level' ? `再闯一遍第${currentLevel + 1}关` :
    currentMode === 'review' ? '再巩固一遍' : '再测一遍全量';

  showPage('report');
}

function redoLevel() {
  currentIndex = 0;
  showPage('quiz');
  showCard();
}

// ===== 总报告 =====
function showFullReport() {
  const results = loadResults();

  // 每天统计
  let html = '';
  for (let d = 1; d <= 5; d++) {
    const dw = WORDS_DATA.filter(w => w.day === d);
    const k = dw.filter(w => getMastery(results[getWordKey(w)]) === 'know').length;
    const m = dw.filter(w => getMastery(results[getWordKey(w)]) === 'maybe').length;
    const u = dw.filter(w => getMastery(results[getWordKey(w)]) === 'unknown').length;
    const todo = dw.length - k - m - u;
    const t = dw.length;
    html += `
      <div class="full-day-row">
        <span class="fdr-label">Day ${d}</span>
        <div class="fdr-bar">
          <div class="seg-know" style="width:${k/t*100}%"></div>
          <div class="seg-maybe" style="width:${m/t*100}%"></div>
          <div class="seg-unknown" style="width:${u/t*100}%"></div>
          <div class="seg-todo" style="width:${todo/t*100}%"></div>
        </div>
        <span class="fdr-nums">${k}✓ ${m}? ${u}✗</span>
      </div>`;
  }
  document.getElementById('fullStats').innerHTML = html;

  // 掌握地图
  const knowWords = WORDS_DATA.filter(w => getMastery(results[getWordKey(w)]) === 'know');
  const maybeWords = WORDS_DATA.filter(w => getMastery(results[getWordKey(w)]) === 'maybe');
  const unknownWords = WORDS_DATA.filter(w => getMastery(results[getWordKey(w)]) === 'unknown');
  const untestedWords = WORDS_DATA.filter(w => !results[getWordKey(w)]);

  function renderWordTags(words, cls) {
    return words.map(w => `<span class="${cls}">${w.english}</span>`).join('');
  }

  let mapHtml = '';
  if (knowWords.length > 0)
    mapHtml += `<div class="mastery-section"><h4>✓ 认识（${knowWords.length}）</h4><div class="mastery-words">${renderWordTags(knowWords, 'mw-know')}</div></div>`;
  if (maybeWords.length > 0)
    mapHtml += `<div class="mastery-section"><h4>? 半熟（${maybeWords.length}）</h4><div class="mastery-words">${renderWordTags(maybeWords, 'mw-maybe')}</div></div>`;
  if (unknownWords.length > 0)
    mapHtml += `<div class="mastery-section"><h4>✗ 不认识（${unknownWords.length}）</h4><div class="mastery-words">${renderWordTags(unknownWords, 'mw-unknown')}</div></div>`;
  if (untestedWords.length > 0)
    mapHtml += `<div class="mastery-section"><h4>未测（${untestedWords.length}）</h4><div class="mastery-words" style="max-height:200px;overflow-y:auto;">${renderWordTags(untestedWords, 'mw-know')}</div></div>`;

  document.getElementById('masteryMap').innerHTML = mapHtml || '<p>还没有测试数据</p>';

  showPage('fullreport');
}

function exportData() {
  const results = loadResults();
  let csv = 'English,Chinese,Tier,Day,Result,History\n';
  WORDS_DATA.forEach(w => {
    const record = results[getWordKey(w)];
    const r = getMastery(record) || '未测';
    const h = record ? record.history.join('→') : '';
    csv += `${w.english},${w.chinese},${w.tier},Day${w.day},${r},${h}\n`;
  });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '单词猎人掌握地图.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ===== 工具 =====
function goHome() { renderHome(); }
function confirmReset() {
  if (confirm('确定要清除所有测试数据吗？此操作不可恢复。')) {
    localStorage.removeItem(STORAGE_KEY);
    renderHome();
  }
}

// ===== 启动 =====
renderHome();
</script>
