<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学习数据说明</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <h1>学习数据说明</h1>
    <section class="panel">
      <h2>使用范围</h2>
      <p>本工具仅供已授权学员和家长使用，用于记录 2000 词学习营的交付过程。</p>
      <p>非学员不能自行注册，也不能查看学员记录。</p>
    </section>
    <section class="panel">
      <h2>记录什么</h2>
      <p>工具会记录学习画像、闪卡结果、7 天打卡、查词查句记录、剧情猜想、老师笔记和下一集草稿。</p>
      <p>这些数据只用于学习交付、老师反馈和下一阶段故事设计。</p>
    </section>
    <section class="panel">
      <h2>不记录什么</h2>
      <p>工具不需要身份证、人脸、精确定位、家庭住址、公开社交资料等信息。</p>
      <p>访问码由老师发放，请不要转发给非学员。</p>
    </section>
    <section class="panel">
      <h2>删除和更正</h2>
      <p>家长可以联系老师更正或删除学习记录。删除后，相关学习数据将不再用于后续交付。</p>
    </section>
    <p><a href="/">返回学员工具</a></p>
  </main>
</body>
</html>
